[book]
authors = ["Patina"]
language = "en"
src = "src"
title = "Developing UEFI with Rust"

[output.html]
additional-js = ["cdn-assets.js", "mermaid.min.js", "mermaid-init.js"]
additional-css = ["./mdbook-admonish.css"]

[output.html.playground]
editable = true
editor = "ace"
line-numbers = true

[output.linkcheck]
warning-policy = "warn"

[output.html.fold]
enable = true

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.admonish]
command = "mdbook-admonish"
assets_version = "3.1.0" # do not edit: managed by `mdbook-admonish install`
